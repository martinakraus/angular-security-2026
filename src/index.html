<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BookmonkeyClient</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta
      http-equiv="Content-Security-Policy"
      content="require-trusted-types-for 'script';"
    />
  </head>
  <body>
    <app-root></app-root>
    <h3>List of names</h3>
    <ul>
      <li id="martina">Martina</li>
      <li id="timo">Timo</li>
      <li>Lenny</li>
      <li>Raupy</li>
    </ul>
    <script>
      let dangerousText = `<img src=x onerror=alert('XSS')>`;
      let trustedTypeText = dangerousText;

      // Creating a trusted type
      if (window.trustedTypes && trustedTypes.createPolicy) {
        // const myPolicy = trustedTypes.createPolicy("customPolicy", {
        //   createHTML: (string) => {
        //     console.warn("createHTML called by customPolicy");
        //     return string.replace(/\</g, "&lt;");
        //   },
        // });
        trustedTypes.createPolicy("default", {
          createHTML: (string) => {
            console.warn("createHTML called by default policy");
            return string.replace(/\</g, "&lt;");
          },
        });
        // trustedTypeText = myPolicy.createHTML(dangerousText);
      }

      document.getElementById("martina").innerHTML = trustedTypeText;
    </script>
  </body>
</html>
